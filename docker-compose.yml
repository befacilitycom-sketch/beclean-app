version: '3.8'

# ============================================================
#   BeClean — Architecture 3 Tiers (Découplée)
# 
#   postgres      — Base de données PostgreSQL 16
#   beclean-backend  — Payload CMS Admin + API  → :8091
#   beclean-frontend — Site Next.js public      → :8090
# ============================================================

services:

  # ── 1. Base de données PostgreSQL ──────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: beclean_postgres
    restart: always
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload_password
      POSTGRES_DB: beclean_payload
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - beclean-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d beclean_payload"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ── 2. Payload CMS Backend (Admin + API) ───────────────────
  beclean-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beclean_backend
    restart: always
    ports:
      - "8091:3000"   # Admin: http://192.168.1.137:8091/admin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PAYLOAD_SECRET=BeFacility_B3cl3an_S3cr3t_2026_Payload
      - DATABASE_URI=postgres://payload:payload_password@postgres:5432/beclean_payload
      - NEXT_PUBLIC_SITE_URL=http://192.168.1.137:8091
    networks:
      - beclean-net
    volumes:
      - media_data:/app/public/media

  # ── 3. Next.js Frontend (Site Public) ─────────────────────
  beclean-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: beclean_frontend
    restart: always
    ports:
      - "8090:3000"   # Site: http://192.168.1.137:8090
    depends_on:
      - beclean-backend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=https://beclean.befacility.com
      - NEXT_PUBLIC_TENANT=beclean
      - NEXT_PUBLIC_API_URL=http://192.168.1.137:8091   # URL publique backend (client-side)
      - PAYLOAD_API_URL=http://beclean-backend:3000     # URL interne Docker (server-side)
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=465
      - SMTP_USER=befacility.com@gmail.com
      - SMTP_PASSWORD=gimc iwuf oelq zwtu
      - SMTP_FROM_EMAIL=BeClean Web <befacility.com@gmail.com>
      - SMTP_TO_EMAIL=befacility.com@gmail.com
    networks:
      - beclean-net

# ── Volumes persistants ────────────────────────────────────
volumes:
  postgres_data:    # Données PostgreSQL
  media_data:       # Médias uploadés via Payload

# ── Réseau interne Docker ──────────────────────────────────
networks:
  beclean-net:
    driver: bridge
